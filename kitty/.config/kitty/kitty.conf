# Kitty Config

include darkworld.conf

# Shell
shell /opt/homebrew/bin/fish

# Font Configuration
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Italic
bold_italic_font FiraCode Nerd Font Mono Bold Italic
font_size 14.0

# Font features for ligatures
font_features FiraCodeNerdFont-Regular +zero +ss01 +ss02 +ss03 +ss04 +ss05

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Window Layout
remember_window_size  yes
initial_window_width  1200
initial_window_height 800
window_padding_width 8
hide_window_decorations titlebar-only
enabled_layouts splits:default

# Background & Transparency
background_opacity 0.5
background_blur 100

# Color Scheme - Gruvbox Dark
foreground #ebdbb2
background #282828
cursor #ebdbb2

# Black
color0 #282828
color8 #928374

# Red
color1 #cc241d
color9 #fb4934

# Green
color2  #98971a
color10 #b8bb26

# Yellow
color3  #d79921
color11 #fabd2f

# Blue
color4  #458588
color12 #83a598

# Magenta
color5  #b16286
color13 #d3869b

# Cyan/Aqua
color6  #689d6a
color14 #8ec07c

# White
color7  #a89984
color15 #ebdbb2

# Tab Bar (minimal)
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #282828
active_tab_background   #458588
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

# Performance
repaint_delay 10
sync_to_monitor yes

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# ===================================
# HOTKEYS
# ===================================

# Split Management (visual mapping)
# Backslash for vertical split (| looks vertical) - side by side
map cmd+shift+backslash launch --location=vsplit --cwd=current
# Minus for horizontal split (— looks horizontal) - top and bottom
map cmd+shift+minus launch --location=hsplit --cwd=current

# Close split/window
map cmd+w close_window
map cmd+shift+w close_window

# Navigate splits (cmd + arrow keys)
map cmd+left neighboring_window left
map cmd+right neighboring_window right
map cmd+up neighboring_window up
map cmd+down neighboring_window down

# Resize splits (cmd + shift + arrow keys)
map cmd+shift+left resize_window narrower 2
map cmd+shift+right resize_window wider 2
map cmd+shift+up resize_window taller 2
map cmd+shift+down resize_window shorter 2

# New tab/window
map cmd+t new_tab
map cmd+n new_os_window

# Tab navigation
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+shift+[ previous_tab
map cmd+shift+] next_tab

# Zoom/unzoom current split
map cmd+shift+z toggle_layout stack

# Copy/Paste
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# Clear terminal
map cmd+k clear_terminal reset active

# Reload config
map cmd+shift+r load_config_file

# Font size
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
